# 夜間ナレッジ抽出(design.md §6.3 / C2 / ADR-0009 / ADR-0013)。minutes の差分を Claude on AWS で抽出し、
# knowledge-base に日次 PR を提案する。**実 PR は EXTRACTOR_REAL_PR=1 のときのみ**(既定 dry-run)。
# 実運用の実行境界は「エフェメラル runner + 秘密の残留遮断」(ADR-0013):
#   persist-credentials:false / clone 先 .git/config のトークン scrub(repos.ts)/ buildAgentEnv の env 遮断。
#
# 必要 secrets:
#   Claude on AWS: ANTHROPIC_AWS_API_KEY / ANTHROPIC_AWS_WORKSPACE_ID / AWS_REGION
#   GitHub 書き込み: EXTRACTOR_PAT(fine-grained・ADR-0013 D1(e)。App 発行後は GH_APP_* trio に差し替え)
#     ※ secret 名に GITHUB_ 接頭辞は使えない(予約)ため GH_/EXTRACTOR_ 名 → GITHUB_ env に写す。
#   任意: DISCORD_OPS_WEBHOOK(#stratum-ops 通知)
# 必要 vars(リポ名はハードコードしない・ADR-0013 D3):
#   EXTRACTOR_MINUTES_REPO(例 org/minutes)/ EXTRACTOR_KB_REPO(例 org/knowledge-base)
# 手順の詳細: docs/runbooks/extractor-real-run.md
name: extractor-nightly

on:
  schedule:
    - cron: "0 18 * * *" # 18:00 UTC = 03:00 JST(翌日)
  workflow_dispatch: {}

jobs:
  extract:
    runs-on: ubuntu-latest
    # 暴走時のコスト上限(通常は EXTRACTOR_MAX_FILES で早く終わる)。ADR-0023 D3。
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          # ADR-0013 D1(a): GITHUB_TOKEN を .git/config に残さない(agentic Read からの漏洩遮断)。
          persist-credentials: false

      - name: Enable corepack (pnpm)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r --if-present run build

      # extractor.yaml は gitignore 済み(実 ID を含むため)。CI では Actions vars から生成する(ADR-0013 D3)。
      # clone URL のトークンは repos.ts が clone 直後に .git/config から scrub する(ADR-0013 D1(b))。
      # vars 未設定(synthetic 検証等)ではスキップし、従来どおり事前配置した CLONES_DIR を使う。
      - name: Generate extractor.yaml (from repo vars)
        if: vars.EXTRACTOR_MINUTES_REPO != '' && vars.EXTRACTOR_KB_REPO != ''
        env:
          EXTRACTOR_PAT: ${{ secrets.EXTRACTOR_PAT }}
        run: |
          mkdir -p apps/extractor/config
          cat > apps/extractor/config/extractor.yaml <<EOF
          minutes:
            repo: ${{ vars.EXTRACTOR_MINUTES_REPO }}
            dir: minutes
            url: https://x-access-token:${EXTRACTOR_PAT}@github.com/${{ vars.EXTRACTOR_MINUTES_REPO }}.git
          kb:
            repo: ${{ vars.EXTRACTOR_KB_REPO }}
            dir: knowledge-base
            url: https://x-access-token:${EXTRACTOR_PAT}@github.com/${{ vars.EXTRACTOR_KB_REPO }}.git
          base_branch: main
          EOF
          echo "extractor.yaml generated (repos: ${{ vars.EXTRACTOR_MINUTES_REPO }}, ${{ vars.EXTRACTOR_KB_REPO }})"

      - name: Run extractor
        if: vars.EXTRACTOR_MINUTES_REPO != '' && vars.EXTRACTOR_KB_REPO != ''
        env:
          CLAUDE_CODE_USE_ANTHROPIC_AWS: "1"
          ANTHROPIC_AWS_API_KEY: ${{ secrets.ANTHROPIC_AWS_API_KEY }}
          ANTHROPIC_AWS_WORKSPACE_ID: ${{ secrets.ANTHROPIC_AWS_WORKSPACE_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          # hybrid(ADR-0013 D4): PR/commit/API は GitHub App のみ。gh-client は App trio が揃えば App を使う。
          # GITHUB_TOKEN(PAT)フォールバックは張らない=App 未設定なら fail-loud(誤って個人 PAT で PR を立てない)。
          # git clone は PAT(上の Generate extractor.yaml の URL)。read=PAT / write=App。
          GITHUB_APP_ID: ${{ secrets.GH_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
          DISCORD_OPS_WEBHOOK: ${{ secrets.DISCORD_OPS_WEBHOOK }}
          CONFIG_DIR: ${{ github.workspace }}/apps/extractor/config
          CLONES_DIR: ${{ github.workspace }}/.clones
          PROMPTS_DIR: ${{ github.workspace }}/prompts
          # LLM 1 呼び出しのタイムアウト。既定 300000(5 分)では大きな議事録が落ちるため 10 分へ(ADR-0023 D3)。
          EXTRACTOR_TIMEOUT_MS: "600000"
          # 夜間 1 回あたりの処理ファイル上限。バックログを少量ずつ・有界コストで消化する(ADR-0023 D3)。
          EXTRACTOR_MAX_FILES: "5"
          # 実 PR を出すときのみ設定(既定は dry-run)。初回 GO は人間判断(ADR-0013 D1(d)・runbook 参照)。
          # EXTRACTOR_REAL_PR: "1"
        run: pnpm --filter @stratum/extractor start
