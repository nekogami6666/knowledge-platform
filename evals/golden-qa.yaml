# ゴールデン質問セット(design.md §10.2)。初版 10 件。
# 各エントリ: id / question / expected_sources(QaCitation 形)/ answer_points / not_found?
# 出典一致率は expected_sources を全て含むかで判定(§6.2 AC1 = 8/10)。
# 回答妥当性(LLM-as-judge §10.2(b))は PR-5b で追加。
# 対象コーパスは evals/fixtures/qa-corpus(synthetic、ADR-0002 安全)。

- id: gq-001
  question: "分注ロボット X は高湿度環境で何が起きますか?"
  expected_sources:
    - kind: github_file
      repo: org/minutes
      path: "2026/06/2026-06-03-hw-weekly.md"
  answer_points:
    - "高湿度で Y 軸が脱調する"

- id: gq-002
  question: "高湿度での Y 軸脱調への対処は?"
  expected_sources:
    - kind: github_file
      repo: org/minutes
      path: "2026/06/2026-06-03-hw-weekly.md"
  answer_points:
    - "除湿機の設置"
    - "運転前のホーミング"

- id: gq-003
  question: "分注ユニットのファーム書き込みは CAN から何に変更されましたか?"
  expected_sources:
    - kind: github_file
      repo: org/minutes
      path: "2026/06/2026-06-03-hw-weekly.md"
  answer_points:
    - "SWD 直結に変更"

- id: gq-004
  question: "ファーム書き込みで CAN を却下した理由は?"
  expected_sources:
